services:
  # ── Backend API (Web Service) ──────────────────────────────────────────────
  - type: web
    name: factory-erp-backend
    runtime: node
    rootDir: backend
    region: frankfurt
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

      # Render injects DATABASE_URL automatically from the linked database
      - key: DATABASE_URL
        fromDatabase:
          name: factory-erp-db
          property: connectionString

      # Render auto-generates a secure random string (32+ chars)
      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: 7d

      # RENDER_EXTERNAL_URL is the full https:// URL Render sets on the frontend service
      - key: CORS_ORIGIN
        fromService:
          name: factory-erp-frontend
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # ── Frontend (Static Site) ─────────────────────────────────────────────────
  - type: web
    name: factory-erp-frontend
    runtime: static
    rootDir: frontend
    region: frankfurt
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      # RENDER_EXTERNAL_URL is the full https:// URL Render sets on the backend service
      - key: VITE_API_URL
        fromService:
          name: factory-erp-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL

# ── PostgreSQL Database ────────────────────────────────────────────────────
databases:
  - name: factory-erp-db
    databaseName: factory_erp
    user: factory_erp_user
    region: frankfurt
    plan: free
